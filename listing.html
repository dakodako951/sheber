<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Объявление — Шебер</title>
  <meta name="description" content="Подробная информация об объявлении мастера на сервисе Шебер." />
  <meta name="theme-color" content="#112b2d" />
  <link rel="icon" type="image/png" href="логитип/логотип.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="listing.css" />
</head>
<body class="listing-page">
  <header class="listing-header">
    <a class="logo" href="index.html"><img src="логитип/логотип.png" alt="" width="51" height="51" /><span class="logo-name" role="img" aria-label="Шебер"></span></a>
    <a class="back-link" href="index.html">← Вернуться к объявлениям</a>
  </header>
  <main class="listing-main" id="listingMain" hidden>
    <div class="breadcrumbs"><a href="index.html">Главная</a><span>›</span><span id="pageCategory"></span><span>›</span><b id="crumbTitle"></b></div>
    <div class="listing-layout">
      <section class="listing-primary">
        <div class="listing-photo"><img id="pageImage" alt="Фото объявления" /></div>
        <article class="listing-description"><h2>Описание</h2><p id="pageDescription"></p></article>
      </section>
      <aside class="listing-sidebar">
        <div class="listing-info-card">
          <div class="listing-location" id="pageCity"></div>
          <h1 id="pageTitle"></h1>
          <div class="listing-price" id="pagePrice"></div>
          <button class="phone-button" id="pagePhone">Показать телефон</button>
          <button class="favorite-button" id="pageFavorite">♡ Добавить в избранное</button>
          <button class="page-edit-button" id="pageEdit" hidden>Редактировать объявление</button>
        </div>
        <div class="seller-card">
          <span class="seller-avatar" id="pageAvatar"></span>
          <div><small>Мастер</small><strong id="pageName"></strong><span id="pageRating"></span></div>
        </div>
        <div class="safety-card"><b>Советы по безопасности</b><p>Не переводите предоплату незнакомым людям. Обсудите стоимость и условия работы заранее.</p></div>
      </aside>
    </div>
  </main>
  <dialog id="pageEditDialog" class="edit-dialog"><form id="pageEditForm"><button type="button" class="dialog-close page-edit-close">×</button><span class="kicker">РЕДАКТИРОВАНИЕ</span><h2>Изменить объявление</h2><div class="form-grid">
    <label>Ваше имя<input name="name" required minlength="2" /></label><label>Город<select name="city"><option>Алматы</option><option>Астана</option><option>Шымкент</option><option>Караганда</option></select></label><label class="full">Название услуги<input name="title" required /></label><label>Категория<select name="category"><option>Ремонт квартир</option><option>Сантехника</option><option>Электрика</option><option>Мебель</option><option>Техника</option><option>Авто</option></select></label><label>Цена от, ₸<input name="price" type="number" min="0" required /></label><label class="full">Описание<textarea name="description" rows="4" required></textarea></label><label>Телефон<input name="phone" required /></label><label class="photo-upload">Новое фото<input name="imageFile" id="pageEditFile" type="file" accept="image/jpeg,image/png,image/webp" /><span class="upload-box"><b>＋ Выбрать новое фото</b><small>до 2 МБ</small></span></label><div class="full edit-preview-wrap"><img id="pageEditPreview" class="image-preview" alt="Фото"/><label class="remove-photo"><input name="removePhoto" type="checkbox"/> Удалить фотографию</label></div></div><div class="edit-form-actions"><button type="button" class="cancel-page-edit cancel-edit">Отмена</button><button class="submit-btn">Сохранить изменения</button></div></form></dialog>
  <div class="listing-missing" id="listingMissing" hidden><h1>Объявление не найдено</h1><a href="index.html">Вернуться в каталог</a></div>
  <div class="toast" id="toast"></div>
  <script src="data.js"></script>
  <script src="listing.js"></script>
</body>
</html>
